{% extends "layout.html" %}

{% block title %}Edit Todo{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="card-title mb-4">Edit Todo</h5>
                <form id="editTodoForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" class="form-control" id="title" name="title"
                               value="{{ todo.title }}" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" class="form-control" id="description" name="description"
                               value="{{ todo.description }}" required minlength="3" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select class="form-control" id="priority" name="priority" required>
                            <option value="1" {% if todo.priority == 1 %}selected{% endif %}>1 – Critical</option>
                            <option value="2" {% if todo.priority == 2 %}selected{% endif %}>2 – High</option>
                            <option value="3" {% if todo.priority == 3 %}selected{% endif %}>3 – Medium</option>
                            <option value="4" {% if todo.priority == 4 %}selected{% endif %}>4 – Low</option>
                            <option value="5" {% if todo.priority == 5 %}selected{% endif %}>5 – Minimal</option>
                        </select>
                    </div>
                    <div class="form-group form-check">
                        <input type="checkbox" class="form-check-input" id="complete" name="complete"
                               {% if todo.complete %}checked{% endif %}>
                        <label class="form-check-label" for="complete">Mark as complete</label>
                    </div>
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary main-color border-0">Save Changes</button>
                        <button type="button" id="deleteButton" class="btn btn-danger">Delete</button>
                    </div>
                </form>
                <div class="mt-3">
                    <a href="/todos/todo-page" class="text-muted small">&larr; Back to todos</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
